<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Slider Validation</title>
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
        }
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            background-color: #000;
            font-family: Arial, sans-serif;
            -webkit-text-size-adjust: 100%;
        }
        .main-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
        }
        .background-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
        }
        .background-image img {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            object-fit: cover;
            display: block;
            border-radius: 0;
        }
        .slider-overlay {
            padding-bottom: env(safe-area-inset-bottom);
            position: absolute;
            bottom: 1.75%;
            left: 50%;
            transform: translateX(-50%);
            width: 75.8%;
            z-index: 10;
        }
        .slider-container {
            position: relative;
            width: 100%;
            height: 54px;
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 27px;
            overflow: hidden;
            border: 2px solid #01615F;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        .slider-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0px;
            background-color: rgba(1, 97, 95, 0.2);
            border-radius: 27px;
        }
        .slider-thumb {
            position: absolute;
            top: 4px;
            left: 4px;
            width: 46px;
            height: 46px;
            background-color: #01615F;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            cursor: pointer;
            z-index: 2;
        }
        .slider-text {
            position: absolute;
            width: 100%;
            text-align: center;
            top: 50%;
            transform: translateY(-50%);
            color: #01615F;
            font-size: 14px;
            font-weight: bold;
            pointer-events: none;
            z-index: 1;
        }
        #mainImage {
            display: none;
            width: 100%;
            border-radius: 12px;
        }
        .validated .slider-container {
            background-color: #01615F;
            border-color: #01615F;
        }
        .validated .slider-text {
            color: white;
        }
    </style>
</head>
<body>
    <div class="main-container" id="mainContainer">
        <div class="background-image">
            <img id="bgImage" src="Image 1.jpeg" alt="Commande">
            <div class="slider-overlay">
                <div class="slider-container" id="sliderContainer">
                    <div class="slider-fill" id="sliderFill"></div>
                    <div class="slider-thumb" id="sliderThumb">&#10140;</div>
                    <div class="slider-text">Valider pour r&#233;cup&#233;rer</div>
                </div>
            </div>
        </div>
        <img id="mainImage" src="Image 2.jpeg" alt="Validation">
    </div>

<script>
    const thumb = document.getElementById('sliderThumb');
    const container = document.getElementById('sliderContainer');
    const fill = document.getElementById('sliderFill');
    const mainImage = document.getElementById('mainImage');
    const bgImage = document.getElementById('bgImage');
    const mainContainer = document.getElementById('mainContainer');

    let isDragging = false;
    let startX = 0;
    let thumbLeft = 4;

    function initMaxLeft() {
        return container.offsetWidth - thumb.offsetWidth - 4;
    }

    thumb.addEventListener('mousedown', function(e) {
        isDragging = true;
        startX = e.clientX - thumbLeft;
        e.preventDefault();
    });

    document.addEventListener('mousemove', function(e) {
        if (!isDragging) return;
        let newLeft = e.clientX - startX;
        let currentMax = initMaxLeft();
        if (newLeft < 4) newLeft = 4;
        if (newLeft > currentMax) newLeft = currentMax;
        thumbLeft = newLeft;
        thumb.style.left = newLeft + 'px';
        fill.style.width = (newLeft + 46) + 'px';
    });

    document.addEventListener('mouseup', function(e) {
        if (!isDragging) return;
        isDragging = false;
        let currentMax = initMaxLeft();
        if (thumbLeft >= currentMax - 5) {
            mainImage.src = 'Image 2.jpeg';
            mainImage.style.display = 'block';
            document.querySelector('.background-image').style.display = 'none';
            thumb.style.left = currentMax + 'px';
            fill.style.width = '100%';
            container.style.backgroundColor = '#01615F';
            document.querySelector('.slider-text').textContent = 'Valid\u00e9 !';
            thumb.style.pointerEvents = 'none';
        } else {
            thumbLeft = 4;
            thumb.style.left = '4px';
            fill.style.width = '0px';
        }
    });

    thumb.addEventListener('touchstart', function(e) {
        isDragging = true;
        startX = e.touches[0].clientX - thumbLeft;
        e.preventDefault();
    });

    document.addEventListener('touchmove', function(e) {
        if (!isDragging) return;
        let newLeft = e.touches[0].clientX - startX;
        let currentMax = initMaxLeft();
        if (newLeft < 4) newLeft = 4;
        if (newLeft > currentMax) newLeft = currentMax;
        thumbLeft = newLeft;
        thumb.style.left = newLeft + 'px';
        fill.style.width = (newLeft + 46) + 'px';
    });

    document.addEventListener('touchend', function(e) {
        if (!isDragging) return;
        isDragging = false;
        let currentMax = initMaxLeft();
        if (thumbLeft >= currentMax - 5) {
            mainImage.src = 'Image 2.jpeg';
            mainImage.style.display = 'block';
            document.querySelector('.background-image').style.display = 'none';
            thumb.style.left = currentMax + 'px';
            fill.style.width = '100%';
            container.style.backgroundColor = '#01615F';
            document.querySelector('.slider-text').textContent = 'Valid\u00e9 !';
            thumb.style.pointerEvents = 'none';
        } else {
            thumbLeft = 4;
            thumb.style.left = '4px';
            fill.style.width = '0px';
        }
    });
</script>
</body>
</html>
