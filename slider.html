<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slider Validation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a2e;
            font-family: Arial, sans-serif;
        }
        .main-container {
            position: relative;
            width: 350px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .slider-container {
            position: relative;
            width: 350px;
            height: 50px;
            background-color: #333;
            border-radius: 25px;
            overflow: hidden;
            border: 2px solid #01615F;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        .slider-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0px;
            background-color: rgba(1, 97, 95, 0.3);
            border-radius: 25px;
            transition: none;
        }
        .slider-thumb {
            position: absolute;
            top: 50%;
            left: 3px;
            transform: translateY(-50%);
            width: 44px;
            height: 44px;
            background-color: #01615F;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
            z-index: 2;
            font-size: 20px;
            color: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        .slider-thumb:active {
            cursor: grabbing;
        }
        .slider-text {
            position: absolute;
            width: 100%;
            text-align: center;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            pointer-events: none;
            z-index: 1;
        }
        .validated .slider-container {
            background-color: #01615F;
            border-color: #01615F;
        }
        .validated .slider-text {
            color: white;
            font-weight: bold;
        }
        #mainImage {
            display: none;
            width: 350px;
            margin-top: 20px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="main-container" id="mainContainer">
        <div class="slider-container" id="sliderContainer">
            <div class="slider-fill" id="sliderFill"></div>
            <div class="slider-thumb" id="sliderThumb">&#10140;</div>
            <div class="slider-text">Valider pour r&#233;cup&#233;rer</div>
        </div>
        <img id="mainImage" src="Image 2.jpeg" alt="Validation">
    </div>

    <script>
        const thumb = document.getElementById('sliderThumb');
        const container = document.getElementById('sliderContainer');
        const fill = document.getElementById('sliderFill');
        const mainImage = document.getElementById('mainImage');
        const mainContainer = document.getElementById('mainContainer');

        let isDragging = false;
        let startX = 0;
        let thumbLeft = 3;
        const maxLeft = 303;

        thumb.addEventListener('mousedown', function(e) {
            isDragging = true;
            startX = e.clientX - thumbLeft;
            e.preventDefault();
        });

        document.addEventListener('mousemove', function(e) {
            if (!isDragging) return;
            let newLeft = e.clientX - startX;
            if (newLeft < 3) newLeft = 3;
            if (newLeft > maxLeft) newLeft = maxLeft;
            thumbLeft = newLeft;
            thumb.style.left = newLeft + 'px';
            fill.style.width = (newLeft + 44) + 'px';
        });

        document.addEventListener('mouseup', function(e) {
            if (!isDragging) return;
            isDragging = false;
            if (thumbLeft >= maxLeft - 5) {
                mainImage.src = 'Image 2.jpeg';
                thumb.style.left = maxLeft + 'px';
                fill.style.width = '100%';
                container.style.backgroundColor = '#01615F';
                document.querySelector('.slider-text').textContent = 'Valide !';
                thumb.style.pointerEvents = 'none';
            } else {
                thumbLeft = 3;
                thumb.style.left = '3px';
                fill.style.width = '0px';
            }
        });

        thumb.addEventListener('touchstart', function(e) {
            isDragging = true;
            startX = e.touches[0].clientX - thumbLeft;
            e.preventDefault();
        });

        document.addEventListener('touchmove', function(e) {
            if (!isDragging) return;
            let newLeft = e.touches[0].clientX - startX;
            if (newLeft < 3) newLeft = 3;
            if (newLeft > maxLeft) newLeft = maxLeft;
            thumbLeft = newLeft;
            thumb.style.left = newLeft + 'px';
            fill.style.width = (newLeft + 44) + 'px';
        });

        document.addEventListener('touchend', function(e) {
            if (!isDragging) return;
            isDragging = false;
            if (thumbLeft >= maxLeft - 5) {
                mainImage.src = 'Image 2.jpeg';
                thumb.style.left = maxLeft + 'px';
                fill.style.width = '100%';
                container.style.backgroundColor = '#01615F';
                document.querySelector('.slider-text').textContent = 'Valide !';
                thumb.style.pointerEvents = 'none';
            } else {
                thumbLeft = 3;
                thumb.style.left = '3px';
                fill.style.width = '0px';
            }
        });
    </script>
</body>
</html>
