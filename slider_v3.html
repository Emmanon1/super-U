<head>
<meta charset="UTF-8">

<title>Manu Driver - Slider v3 - Touch Mobile</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
.sc{position:relative;width:100%;height:100%;max-width:430px;margin:0 auto;overflow:hidden}
.sw{display:flex;width:200%;height:100%;transition:transform .4s cubic-bezier(.25,.46,.45,.94);will-change:transform}
.sw.drag{transition:none}
.sl{width:50%;height:100%;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#000}
.sl img{width:100%;height:100%;object-fit:contain;pointer-events:none;user-select:none;-webkit-user-drag:none}
.ctrl{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);width:80%;max-width:340px;height:56px;background:rgba(255,255,255,.15);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-radius:28px;display:flex;align-items:center;padding:4px;z-index:10;box-shadow:0 4px 20px rgba(0,0,0,.3);transition:opacity .4s ease,transform .4s ease}
.trk{position:relative;width:100%;height:100%;border-radius:24px;overflow:hidden}
.fill{position:absolute;top:0;left:0;height:100%;width:0%;background:linear-gradient(90deg,#1a8a6a,#2ab58a);border-radius:24px;transition:width .3s ease}
.fill.drag{transition:none}
.thb{position:absolute;top:4px;left:4px;width:40px;height:40px;background:#1a8a6a;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:grab;z-index:2;transition:left .3s ease,transform .2s ease;box-shadow:0 2px 8px rgba(26,138,106,.4)}
.thb.drag{transition:none;transform:scale(1.1);cursor:grabbing}
.thb svg{width:20px;height:20px;fill:none;stroke:#fff;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.lbl{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:rgba(255,255,255,.9);font-size:14px;font-weight:600;white-space:nowrap;pointer-events:none;transition:opacity .3s ease}
.thb.hint{animation:hs 2s ease-in-out infinite}
@keyframes hs{0%,100%{left:4px}40%,60%{left:50px}}
.dots{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:10}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.4);transition:background .3s ease,transform .3s ease}
.dot.on{background:#fff;transform:scale(1.3)}
</style>
